<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      const routes = {
            "/bigzip": "https://github.com/OmriMendel/files/releases/download/3/File.zip",
            "/sudoku": "https://github.com/OmriMendel/Sudoku",
            "/ECF": "https://github.com/OmriMendel/ECF",
            "/audioencryption": "https://github.com/OmriMendel/AudioEncryption",
          
            "/download/sudoku": "https://play.google.com/store/apps/details?id=com.omrim.sudoku",
            "/download/audioencryption": "https://github.com/OmriMendel/AudioEncryption/releases/latest",
            "/download/ecf": "https://github.com/OmriMendel/ECF/releases/latest"
        };
        const path = window.location.pathname.toLowerCase().replace(/\/$/, "");

        if (routes[path]) {
            window.location.replace(routes[path]);
        } else {
            window.location.replace("https://omrimendel.github.io/");
        }
    </script>
</head>
<body>
    <p>Redirecting you... if nothing happens, <a href="/">click here</a>.</p>
</body>
</html>
